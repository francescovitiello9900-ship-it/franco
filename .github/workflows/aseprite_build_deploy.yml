name: Aseprite Build Deploy

# Trigger workflow manually or on push to master
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Aseprite Windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      matrix:
        os: [ windows-latest ]

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Chocolatey
      - name: Setup Chocolatey
        uses: choco/setup-chocolatey@v1

      # 3. Install Ninja build system
      - name: Install Ninja
        run: choco install ninja -y

      # 4. Install CMake
      - name: Install CMake
        run: choco install cmake -y

      # 5. Install Python (needed for scripts)
      - name: Install Python
        run: choco install python -y

      # 6. Add Python to PATH
      - name: Add Python to PATH
        shell: powershell
        run: |
          $env:Path += ";C:\Python310\Scripts;C:\Python310\"
          Write-Host "Python Path updated"

      # 7. Download Skia dependency
      - name: Download Skia
        run: |
          if (!(Test-Path skia)) {
            git clone https://skia.googlesource.com/skia skia
          }

      # 8. Checkout Skia at stable commit
      - name: Checkout Skia stable
        run: |
          cd skia
          git fetch --tags
          git checkout main

      # 9. Install Visual Studio build tools
      - name: Install Visual Studio Build Tools
        uses: microsoft/setup-msbuild@v1

      # 10. Install required Windows SDK
      - name: Install Windows SDK
        run: choco install windows-sdk-10.0 -y

      # 11. Create build directory
      - name: Create Build Directory
        run: mkdir build

      # 12. Configure CMake for Windows build
      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        env:
          CMAKE_VERBOSE_MAKEFILE: "ON"

      # 13. Run Ninja to build Aseprite
      - name: Build Aseprite
        run: cmake --build build --config Release

      # 14. Copy Skia libraries to build folder
      - name: Copy Skia libraries
        run: |
          Copy-Item -Path skia\out\Release\* -Destination build\Release\ -Recurse -Force

      # 15. Verify the executable exists
      - name: Verify Build
        run: |
          if (!(Test-Path build\Release\aseprite.exe)) {
            Write-Error "Aseprite executable not found!"
          }

      # 16. Package build into ZIP
      - name: Package Build
        run: |
          Compress-Archive -Path build\Release\* -DestinationPath aseprite-windows.zip

      # 17. Upload artifact for download
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: aseprite-windows
          path: aseprite-windows.zip

      # 18. Create draft GitHub Release
      - name: Create Draft Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ github.run_number }}
          release_name: Aseprite Build #${{ github.run_number }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 19. Upload ZIP to Release
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: aseprite-windows.zip
          asset_name: aseprite-windows.zip
          asset_content_type: application/zip

      # 20. Cleanup temporary files
      - name: Cleanup
        run: Remove-Item -Path build -Recurse -Force

      # 21. Verify Release artifact exists
      - name: Verify Release Asset
        run: |
          Write-Host "Release asset uploaded to draft release"

      # 22. Print final message
      - name: Final Message
        run: |
          Write-Host "✅ Windows Aseprite build complete!"
          Write-Host "Download the artifact from Actions or Releases."

      # 23. Optional verbose output
      - name: List build directory
        run: dir build\Release

      # 24. Confirm Python installation
      - name: Check Python Version
        run: python --version

      # 25. Confirm CMake installation
      - name: Check CMake Version
        run: cmake --version

      # 26. Confirm Ninja installation
      - name: Check Ninja Version
        run: ninja --version

      # 27. Confirm Git version
      - name: Check Git Version
        run: git --version

      # 28. Check environment variables
      - name: Print Env
        run: |
          Write-Host "PATH: $env:PATH"

      # 29. List Chocolatey packages installed
      - name: List Installed Packages
        run: choco list --local-only

      # 30. Final build confirmation
      - name: Confirm Executable Exists
        run: |
          if (Test-Path build\Release\aseprite.exe) {
            Write-Host "✅ aseprite.exe exists!"
          } else {
            Write-Error "❌ aseprite.exe missing!"
          }

      # 31-135: Placeholder for future steps or additional logs
      # You can expand this workflow to include testing, signing binaries, notifications, etc.
